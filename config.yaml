llm:
  model: mistral-small-v3
  system_prompt: |
    You are Neo, a personal AI assistant.
    You are concise, helpful, and natural.
    You help the user organize tasks and answer clearly.
    Use short sentences.
    You ONLY speak in french.

wake:
  enabled: false
  model: "hey_jarvis"
  samplerate: 16000
  chunk_size: 1280
  threshold: 0.5

stt:
  model: whisper-large-v3-turbo
  samplerate: 16000

vad:
  frame_size: 512
  threshold: 0.4
  silence_threshold: 40

tts:
  voice: "Audrey (Premium)"
  rate: 220

conversation:
  inactivity_timeout: 30